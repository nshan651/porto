services:

  gnosis_ts:
    image: tailscale/tailscale:latest
    container_name: gnosis_ts
    hostname: gnosis
    networks:
      - private_net
    ports:
      - "80:80"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--login-server=https://hs.${PUBLIC_DOMAIN}:443 --accept-routes --accept-dns=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ../data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  gnosis_proxy:
    image: traefik
    container_name: gnosis_proxy
    restart: unless-stopped
    network_mode: service:gnosis_ts
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.constraints=Label(`traefik.scope`, `private`)"
      - "--providers.docker.network=private_net"
      - "--entrypoints.web.address=:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - gnosis_ts

  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: opencode
    restart: unless-stopped
    networks:
      - private_net
    volumes:
      - ../data/opencode:/data
      - /mnt/media/vault/agents:/agents
    environment:
      GOOGLE_GENERATIVE_AI_API_KEY: ${GEMINI_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      XDG_DATA_HOME: /data
      XDG_CONFIG_HOME: /data/config
      XDG_STATE_HOME: /data/state
      XDG_CACHE_HOME: /data/cache
    working_dir: /agents
    command: ["web", "--hostname", "0.0.0.0"]
    labels:
      - "traefik.enable=true"
      - "traefik.scope=private"
      - "traefik.http.routers.opencode.rule=Host(`oc.gnosis.arpa`)"
      - "traefik.http.routers.opencode.entrypoints=web"
      - "traefik.http.services.opencode.loadbalancer.server.port=4096"

  syncthing:
    container_name: syncthing
    image: linuxserver/syncthing:latest
    restart: unless-stopped
    networks:
      - private_net
    labels:
      - "traefik.enable=true"
      - "traefik.scope=private"
      - "traefik.http.routers.syncthing.rule=Host(`syncthing.gnosis.arpa`)"
      - "traefik.http.routers.syncthing.entrypoints=web"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"
    environment:
      TZ: America/Chicago
      PUID: 1000
      PGID: 1000
    volumes:
      - ../data/syncthing:/config
      - /mnt/media/ark:/data1

networks:
  private_net:
    driver: bridge
