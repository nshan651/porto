services:

  opencode_tailscale:
    image: tailscale/tailscale:latest
    container_name: opencode_tailscale
    hostname: gnosis
    networks:
      - ai_net
    ports:
      - "4096:4096"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--login-server=https://hs.${PUBLIC_DOMAIN}:443 --accept-routes --accept-dns=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./data/tailscale-opencode:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: opencode
    restart: unless-stopped
    network_mode: service:opencode_tailscale
    volumes:
      - ./data/opencode:/data
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    command: ["web", "--hostname", "0.0.0.0"]
    depends_on:
      - opencode_tailscale

networks:
  ai_net:
    driver: bridge
